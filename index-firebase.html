<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ZDH Sales Tracker - Firebase</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0b1628;--surface:#101e36;--surface2:#162540;--border:#1d3055;
  --blue:#4a9eff;--green:#00d97e;--orange:#f5a623;--purple:#bf7af0;--red:#e05a5a;--yellow:#f5c518;
  --text:#e2e8f0;--text2:#8aa8d0;--text3:#4a6a90;
}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh;padding-bottom:72px;font-size:14px;}

/* AUTH SCREEN */
.auth-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:500;padding:20px;}
.auth-card{background:var(--surface);border-radius:20px;border:1px solid var(--border);padding:30px;max-width:400px;width:100%;}
.auth-card h2{font-size:20px;margin-bottom:15px;text-align:center;color:var(--blue);}
.auth-card input{width:100%;padding:12px;margin-bottom:10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:inherit;}
.auth-card button{width:100%;padding:12px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer;margin-top:10px;}
.auth-err{color:var(--red);font-size:12px;margin:10px 0;}
.auth-link{text-align:center;font-size:12px;color:var(--text3);margin-top:10px;}
.auth-link a{color:var(--blue);cursor:pointer;text-decoration:none;}
.auth-screen.hidden{display:none;}

/* HEADER */
.header{background:linear-gradient(135deg,#0f1e3a,#162447);border-bottom:1px solid var(--border);padding:12px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:40;}
.logo{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#f5c518,#e6a800);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#0b1628;}
.header-info{flex:1;}
.header-title{font-size:14px;font-weight:700;}
.header-sub{font-size:10px;color:var(--text3);display:flex;align-items:center;gap:5px;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);flex-shrink:0;}
.sync-dot.ok{background:var(--green);}
.sync-dot.syncing{background:var(--yellow);animation:blink 1s infinite;}
.sync-dot.err{background:var(--red);}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
.header-btns{display:flex;gap:5px;}

/* NAV */
.nav{position:fixed;bottom:0;left:0;right:0;background:#0f1e3a;border-top:1px solid var(--border);display:flex;z-index:50;}
.nav-btn{flex:1;padding:11px 0 9px;background:none;border:none;color:var(--text3);font-size:10px;font-weight:500;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-family:inherit;transition:color .2s;}
.nav-btn.active{color:var(--blue);border-top:2px solid var(--blue);}
.nav-icon{font-size:17px;}

/* PAGES */
.page{display:none;padding:13px;}
.page.active{display:block;}

/* BUTTONS */
.btn{border:none;border-radius:10px;padding:8px 13px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .15s;}
.btn:active{opacity:.75;}
.btn-blue{background:#1a3a6b;color:var(--blue);}
.btn-green{background:#1a3a20;color:var(--green);}
.btn-red{background:#2a1520;color:var(--red);}
.btn-ghost{background:var(--surface2);color:var(--text2);}
.btn-yellow{background:#2a2010;color:var(--yellow);}
.btn-full{width:100%;padding:12px;font-size:14px;}
.btn-icon{padding:7px 10px;font-size:12px;}

/* CARDS */
.card{background:var(--surface);border-radius:14px;border:1px solid var(--border);padding:13px;margin-bottom:11px;}
.card-title{font-size:11px;color:var(--text3);font-weight:600;margin-bottom:9px;}

/* STATS */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:11px;}
.stat-card{border-radius:13px;padding:12px;border-width:1px;border-style:solid;}
.stat-label{font-size:10px;font-weight:600;margin-bottom:2px;opacity:.7;}
.stat-val{font-size:21px;font-weight:800;line-height:1.1;}
.stat-sub{font-size:10px;margin-top:2px;opacity:.55;}

/* CLOUD BANNER */
.cloud-banner{background:linear-gradient(135deg,#0a1e14,#0f2820);border:1px solid var(--green);border-radius:12px;padding:12px;margin-bottom:11px;display:flex;align-items:center;gap:10px;}
.cloud-banner.err{border-color:var(--red);background:linear-gradient(135deg,#1e0a0a,#280f0f);}

/* INPUTS */
input,select,textarea{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:10px 12px;font-size:13px;outline:none;font-family:inherit;width:100%;}
input:focus,select:focus,textarea:focus{border-color:var(--blue);}

/* TOAST */
.toast{position:fixed;top:68px;left:50%;transform:translateX(-50%);padding:9px 18px;border-radius:10px;font-size:13px;font-weight:600;z-index:200;opacity:0;transition:opacity .3s;}
.toast.show{opacity:1;}
.toast-ok{background:#1a3a20;color:var(--green);}
.toast-err{background:#2a1520;color:var(--red);}
.toast-info{background:#1a3a6b;color:var(--blue);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);align-items:flex-end;justify-content:center;z-index:100;display:none;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border-radius:20px 20px 0 0;padding:20px 15px 36px;width:100%;max-height:92vh;overflow-y:auto;border:1px solid var(--border);}
.modal-title{font-size:15px;font-weight:700;margin-bottom:13px;}

/* ORDER ITEM */
.order-item{display:flex;align-items:center;gap:9px;padding:9px 0;border-bottom:1px solid #182a48;}
.order-item:last-child{border-bottom:none;}
.order-icon{width:33px;height:33px;border-radius:9px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.order-info{flex:1;min-width:0;}
.order-name{font-size:12px;font-weight:600;color:#c8d8f0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.order-meta{font-size:10px;color:var(--text3);display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-top:2px;}
.order-right{text-align:right;flex-shrink:0;}
.order-amount{font-size:13px;font-weight:700;color:var(--green);}
.order-actions{display:flex;gap:4px;flex-shrink:0;}

/* EMPTY */
.empty{text-align:center;color:var(--text3);padding:36px 0;font-size:13px;line-height:1.8;}

@media(min-width:480px){.stats-grid{grid-template-columns:repeat(4,1fr);}}
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div class="auth-screen" id="authScreen">
  <div class="auth-card">
    <h2>🔐 Login / Register</h2>
    <div id="authForm">
      <input type="email" id="authEmail" placeholder="Email" required>
      <input type="password" id="authPassword" placeholder="Password">
      <div class="auth-err" id="authErr"></div>
      <button onclick="authLogin()">🔓 Login</button>
      <button onclick="authRegister()" style="background:#1a3a20;color:var(--green);">✨ Register</button>
      <button onclick="authGuest()" style="background:var(--surface2);color:var(--text2);">👤 Guest (Local Only)</button>
    </div>
  </div>
</div>

<!-- HEADER -->
<div class="header">
  <div class="logo">Z</div>
  <div class="header-info">
    <div class="header-title">Zaid Digital Hub 👋</div>
    <div class="header-sub">
      <div class="sync-dot" id="syncDot"></div>
      <span id="syncLabel">Memuat...</span>
    </div>
  </div>
  <div class="header-btns">
    <button class="btn btn-blue btn-icon" onclick="exportCSV()">📤</button>
    <button class="btn btn-red btn-icon" onclick="authLogout()" title="Logout">🚪</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast toast-ok" id="toast"></div>

<!-- ===== DASHBOARD ===== -->
<div class="page active" id="page-dashboard">
  <div class="cloud-banner" id="cloudBanner">
    <span style="font-size:22px">☁️</span>
    <div style="flex:1">
      <div style="font-size:12px;font-weight:700;color:var(--green)">Cloud Sync Active</div>
      <div style="font-size:10px;color:var(--text3)" id="userInfo">Data tersimpan di cloud Firebase</div>
    </div>
  </div>

  <div class="card">
    <div style="display:flex;gap:7px;align-items:center;flex-wrap:wrap;">
      <span class="card-title" style="margin:0">Filter Periode:</span>
      <input type="date" id="dateFrom" style="width:auto;flex:1;">
      <span style="color:var(--text3);">–</span>
      <input type="date" id="dateTo" style="width:auto;flex:1;">
    </div>
  </div>

  <div class="stats-grid" id="statsGrid"></div>
  <div class="card">
    <div class="card-title">Grafik Penjualan</div>
    <canvas id="salesChart"></canvas>
    <div class="empty" id="chartEmpty" style="display:none;padding:20px 0;">Belum ada data</div>
  </div>

  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;">
      <div class="card-title" style="margin:0" id="orderListTitle">Riwayat Transaksi</div>
    </div>
    <div id="orderList"><div class="empty">Belum ada transaksi</div></div>
  </div>
</div>

<!-- ===== TAMBAH ===== -->
<div class="page" id="page-tambah">
  <div class="card">
    <div class="modal-title">➕ Tambah Transaksi</div>
    <div style="margin-bottom:11px; font-weight:600; padding-bottom:7px; border-bottom:1px solid var(--border);">🧾 Data Transaksi</div>
    
    <div style="margin-bottom:11px;">
      <label style="font-size:11px;color:var(--text3);font-weight:600;display:block;margin-bottom:4px;">Tanggal</label>
      <input type="date" id="fDate">
    </div>
    <div style="margin-bottom:11px;">
      <label style="font-size:11px;color:var(--text3);font-weight:600;display:block;margin-bottom:4px;">Produk</label>
      <select id="fProduct">
        <option>Paket 750+ Produk Digital</option>
        <option>Paket 750+ & 8Juta+ Produk Digital</option>
        <option>Paket Formula Strategi Ngiklan & 750+</option>
      </select>
    </div>
    <div style="margin-bottom:11px;">
      <label style="font-size:11px;color:var(--text3);font-weight:600;display:block;margin-bottom:4px;">Nominal (Rp)</label>
      <input type="number" id="fAmount" placeholder="25000" inputmode="numeric">
    </div>
    <div style="margin-bottom:11px;">
      <label style="font-size:11px;color:var(--text3);font-weight:600;display:block;margin-bottom:4px;">Platform</label>
      <select id="fPlatform">
        <option>Scalev</option><option>Lynk.id</option><option>Tokopedia</option>
        <option>TikTok Shop</option><option>WhatsApp</option><option>Lainnya</option>
      </select>
    </div>
    <div style="margin-bottom:11px;">
      <label style="font-size:11px;color:var(--text3);font-weight:600;display:block;margin-bottom:4px;">Status</label>
      <select id="fStatus">
        <option value="completed">✅ Completed</option>
        <option value="pending">⏳ Pending</option>
      </select>
    </div>

    <div style="margin-bottom:11px; font-weight:600; padding-bottom:7px; border-bottom:1px solid var(--border);">👤 Data Pembeli (opsional)</div>
    <div style="margin-bottom:11px;">
      <label style="font-size:11px;color:var(--text3);font-weight:600;display:block;margin-bottom:4px;">Nama</label>
      <input type="text" id="fNama" placeholder="Nama pembeli">
    </div>
    <div style="margin-bottom:11px;">
      <label style="font-size:11px;color:var(--text3);font-weight:600;display:block;margin-bottom:4px;">Email</label>
      <input type="email" id="fEmail" placeholder="email@example.com">
    </div>
    <div style="margin-bottom:11px;">
      <label style="font-size:11px;color:var(--text3);font-weight:600;display:block;margin-bottom:4px;">No HP</label>
      <input type="tel" id="fHp" placeholder="08123456789">
    </div>

    <div style="display:flex;gap:9px;margin-top:4px;">
      <button class="btn btn-green btn-full" id="submitBtn" onclick="submitOrder()">Tambah</button>
      <button class="btn btn-ghost btn-full" id="cancelBtn" onclick="cancelEdit()" style="display:none;">Batal</button>
    </div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="nav">
  <button class="nav-btn active" id="nav-dashboard" onclick="switchTab('dashboard')"><span class="nav-icon">📊</span>Dashboard</button>
  <button class="nav-btn" id="nav-tambah" onclick="switchTab('tambah')"><span class="nav-icon">➕</span>Tambah</button>
</nav>

<script>
// ===================== FIREBASE CONFIG =====================
// GANTI DENGAN KONFIGURASI FIREBASE ANDA!
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "https://YOUR_PROJECT.firebaseio.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

// Initialize Firebase
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js';
import { getDatabase, ref, set, get, onValue, remove } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js';

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

// ===================== STATE =====================
let orders = [], editId = null, chartInstance = null;
let currentUser = null, isGuest = false;
let currentFrom = '', currentTo = '';

// ===================== UTILS =====================
const toYMD = d => d.toISOString().slice(0,10);
const addDays = (s,n) => { const d=new Date(s); d.setDate(d.getDate()+n); return toYMD(d); };
const fmtRp = n => 'Rp '+Number(n).toLocaleString('id-ID');
const fmtShort = n => n>=1e9?'Rp '+(n/1e9).toFixed(2).replace('.',',')+'M':n>=1e6?'Rp '+(n/1e6).toFixed(2).replace('.',',')+' jt':n>=1000?'Rp '+(n/1000).toFixed(0)+'rb':'Rp '+n;
const todayStr = () => toYMD(new Date());
const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2);

let toastTimer;
function showToast(msg, type='ok') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast toast-${type} show`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 2600);
}

function setSyncStatus(state, label) {
  const dot = document.getElementById('syncDot');
  const lbl = document.getElementById('syncLabel');
  dot.className = 'sync-dot' + (state ? ' '+state : '');
  lbl.textContent = label;
}

// ===================== AUTH =====================
function showAuthScreen(show=true) {
  document.getElementById('authScreen').classList.toggle('hidden', !show);
  document.querySelector('.header').style.display = show ? 'none' : 'flex';
  document.querySelectorAll('.page').forEach(p => p.style.display = show ? 'none' : 'block');
  document.querySelector('.nav').style.display = show ? 'none' : 'flex';
}

async function authLogin() {
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value.trim();
  if (!email || !password) { showAuthErr('Email dan password wajib diisi'); return; }
  try {
    const res = await signInWithEmailAndPassword(auth, email, password);
    currentUser = res.user;
    isGuest = false;
    loadDataFromFirebase();
    showAuthScreen(false);
  } catch(e) { showAuthErr('Login gagal: '+e.message); }
}

async function authRegister() {
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value.trim();
  if (!email || !password) { showAuthErr('Email dan password wajib diisi'); return; }
  if (password.length < 6) { showAuthErr('Password minimal 6 karakter'); return; }
  try {
    const res = await createUserWithEmailAndPassword(auth, email, password);
    currentUser = res.user;
    isGuest = false;
    showToast('✅ Register berhasil!');
    loadDataFromFirebase();
    showAuthScreen(false);
  } catch(e) { showAuthErr('Register gagal: '+e.message); }
}

function authGuest() {
  currentUser = null;
  isGuest = true;
  setSyncStatus('', 'Guest Mode (Local Only)');
  showAuthScreen(false);
  loadFromLocal();
  init();
}

async function authLogout() {
  if (confirm('Logout?')) {
    await signOut(auth);
    currentUser = null;
    document.getElementById('authEmail').value = '';
    document.getElementById('authPassword').value = '';
    document.getElementById('authErr').textContent = '';
    showAuthScreen(true);
  }
}

function showAuthErr(msg) {
  document.getElementById('authErr').textContent = msg;
}

// ===================== FIREBASE SYNC =====================
function getDbRef() {
  if (!currentUser) return null;
  return ref(db, `users/${currentUser.uid}/orders`);
}

async function loadDataFromFirebase() {
  if (!currentUser) return;
  setSyncStatus('syncing', 'Memuat dari cloud...');
  try {
    const dbRef = getDbRef();
    const snapshot = await get(dbRef);
    if (snapshot.exists()) {
      orders = Object.values(snapshot.val());
    } else {
      orders = [];
    }
    saveToLocal();
    setSyncStatus('ok', 'Cloud sync aktif ✓');
    init();
  } catch(e) {
    setSyncStatus('err', 'Gagal load cloud');
    loadFromLocal();
    init();
  }
}

async function syncToFirebase() {
  if (!currentUser) return;
  setSyncStatus('syncing', 'Menyimpan...');
  try {
    const dbRef = getDbRef();
    const data = {};
    orders.forEach(o => { data[o.id] = o; });
    await set(dbRef, data);
    setSyncStatus('ok', 'Tersimpan ✓');
  } catch(e) {
    setSyncStatus('err', 'Gagal sync cloud');
    showToast('⚠️ Data tersimpan lokal', 'err');
  }
}

// ===================== LOCAL STORAGE =====================
function saveToLocal() {
  try { localStorage.setItem('zdh-tracker-firebase', JSON.stringify(orders)); } catch(e) {}
}
function loadFromLocal() {
  try { orders = JSON.parse(localStorage.getItem('zdh-tracker-firebase')||'[]'); } catch(e) { orders=[]; }
}

// ===================== RENDER =====================
function renderDashboard() {
  const all = orders.filter(o => o.date >= currentFrom && o.date <= currentTo);
  const completed = all.filter(o => o.status === 'completed');
  const pending = all.filter(o => o.status === 'pending');
  const totalRev = all.reduce((s,o)=>s+o.amount,0);
  const totalCnt = all.length;
  const avgOrd = totalCnt ? Math.round(totalRev/totalCnt) : 0;

  // Stats
  const stats = [
    {label:'Est. Gross Revenue',val:fmtShort(totalRev),sub:fmtRp(totalRev),col:'#4a9eff',bg:'#0f2040',border:'#4a9eff22'},
    {label:'Total Order',val:totalCnt,sub:'transactions',col:'#00d97e',bg:'#0a1e14',border:'#00d97e22'},
    {label:'Completed',val:completed.length,sub:'✅ done',col:'#f5a623',bg:'#201a0a',border:'#f5a62322'},
    {label:'Pending',val:pending.length,sub:'⏳ waiting',col:'#bf7af0',bg:'#180e2a',border:'#bf7af022'},
  ];
  document.getElementById('statsGrid').innerHTML = stats.map(s=>
    `<div class="stat-card" style="background:${s.bg};border-color:${s.border}">
      <div class="stat-label" style="color:${s.col}">${s.label}</div>
      <div class="stat-val" style="color:${s.col}">${s.val}</div>
      <div class="stat-sub" style="color:${s.col}">${s.sub}</div>
    </div>`).join('');

  // Chart
  const map = {};
  for (let d=currentFrom; d<=currentTo; d=addDays(d,1)) map[d] = {date:d,rev:0,cnt:0};
  all.forEach(o => { if(map[o.date]) { map[o.date].rev+=o.amount; map[o.date].cnt+=1; } });
  const days = Object.values(map);
  let labels=[], revData=[], cntData=[];
  days.forEach(d=>{labels.push(d.date.slice(5));revData.push(d.rev);cntData.push(d.cnt);});

  const canvas = document.getElementById('salesChart');
  const empty = document.getElementById('chartEmpty');
  if (!all.length) { canvas.style.display='none'; empty.style.display='block'; }
  else {
    canvas.style.display='block'; empty.style.display='none';
    if (chartInstance) chartInstance.destroy();
    chartInstance = new Chart(canvas, {
      data: {labels, datasets:[
        {type:'bar',label:'Revenue',data:revData,backgroundColor:'rgba(74,158,255,0.72)',borderRadius:4,yAxisID:'y1'},
        {type:'line',label:'Count',data:cntData,borderColor:'#f5a623',borderWidth:2.5,pointRadius:0,tension:0.4,yAxisID:'y2'},
      ]},
      options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{display:false}},scales:{y1:{beginAtZero:true,position:'left'},y2:{beginAtZero:true,position:'right'}}}
    });
  }

  // Orders
  const ol = document.getElementById('orderList');
  document.getElementById('orderListTitle').textContent = `Riwayat (${all.length})`;
  if (!all.length) { ol.innerHTML='<div class="empty">Belum ada transaksi</div>'; return; }
  const sorted = [...all].sort((a,b)=>b.date.localeCompare(a.date));
  ol.innerHTML = sorted.map(o=>{
    const isPending = o.status === 'pending';
    const PLAT_ICON = {'Scalev':'🛍️','Lynk.id':'🔗','Tokopedia':'🟢','TikTok Shop':'🎵','WhatsApp':'💬','Lainnya':'📦'};
    return `<div class="order-item">
      <div class="order-icon">${PLAT_ICON[o.platform]||'📦'}</div>
      <div class="order-info">
        <div class="order-name">${o.product}</div>
        <div class="order-meta">
          <span>${o.date}</span> <span>·</span> <span>${o.platform}</span>
          ${o.nama?`<span>·</span><span>${o.nama}</span>`:''}
        </div>
      </div>
      <div class="order-right">
        <div class="order-amount" style="${isPending?'color:var(--yellow)':''}">${fmtRp(o.amount)}</div>
        <div style="font-size:10px;color:var(--text3)">${isPending?'⏳':'✅'}</div>
      </div>
      <div class="order-actions">
        <button class="btn btn-blue btn-icon" onclick="startEdit('${o.id}')">✏️</button>
        <button class="btn btn-red btn-icon" onclick="deleteOrder('${o.id}')">🗑️</button>
      </div>
    </div>`;
  }).join('');
}

// ===================== ORDER FORM =====================
function submitOrder() {
  const date = document.getElementById('fDate').value;
  const amount = parseInt(document.getElementById('fAmount').value||'0', 10);
  if (!date || !amount) { showToast('⚠️ Tanggal & nominal wajib diisi.','err'); return; }
  const o = {
    date, amount,
    platform: document.getElementById('fPlatform').value,
    product: document.getElementById('fProduct').value,
    status: document.getElementById('fStatus').value,
    nama: document.getElementById('fNama').value,
    email: document.getElementById('fEmail').value,
    hp: document.getElementById('fHp').value,
  };
  if (editId) {
    orders = orders.map(x => x.id===editId ? {...x,...o} : x);
    editId = null;
    showToast('✅ Transaksi diperbarui!');
  } else {
    orders.unshift({id:uid(),...o});
    showToast('✅ Transaksi ditambahkan!');
  }
  saveToLocal();
  if (currentUser) syncToFirebase();
  resetForm();
  switchTab('dashboard');
  renderDashboard();
}

function startEdit(id) {
  const o = orders.find(x=>x.id===id);
  if (!o) return;
  editId = id;
  document.getElementById('fDate').value = o.date;
  document.getElementById('fAmount').value = o.amount;
  document.getElementById('fPlatform').value = o.platform;
  document.getElementById('fProduct').value = o.product;
  document.getElementById('fStatus').value = o.status;
  document.getElementById('fNama').value = o.nama||'';
  document.getElementById('fEmail').value = o.email||'';
  document.getElementById('fHp').value = o.hp||'';
  document.getElementById('submitBtn').textContent = 'Simpan';
  document.getElementById('cancelBtn').style.display = 'block';
  switchTab('tambah');
}

function cancelEdit() { editId=null; resetForm(); }
function resetForm() {
  editId=null;
  document.getElementById('fDate').value = todayStr();
  document.getElementById('fAmount').value = '';
  document.getElementById('fPlatform').value = 'Scalev';
  document.getElementById('fProduct').value = 'Paket 750+ Produk Digital';
  document.getElementById('fStatus').value = 'completed';
  ['fNama','fEmail','fHp'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('submitBtn').textContent = 'Tambah';
  document.getElementById('cancelBtn').style.display = 'none';
}

function deleteOrder(id) {
  if (!confirm('Hapus transaksi ini?')) return;
  orders = orders.filter(o=>o.id!==id);
  saveToLocal();
  if (currentUser) syncToFirebase();
  renderDashboard();
  showToast('🗑️ Terhapus');
}

// ===================== EXPORT =====================
function exportCSV() {
  if (!orders.length) { showToast('⚠️ Belum ada data.','err'); return; }
  const cols = ['date','amount','platform','product','status','nama','email','hp'];
  const rows = [cols.join(','), ...orders.map(o=>cols.map(c=>String(o[c]||'').replace(/,/g,' ')).join(','))];
  const blob = new Blob([rows.join('\n')], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'trackers-'+todayStr()+'.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  showToast('📤 Export OK!');
}

// ===================== TAB =====================
function switchTab(name) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');
  if (name==='tambah'&&!editId) resetForm();
  window.scrollTo(0,0);
}

// ===================== INIT =====================
async function init() {
  const t = todayStr();
  currentFrom = addDays(t,-29); currentTo = t;
  document.getElementById('dateFrom').value = currentFrom;
  document.getElementById('dateTo').value = currentTo;
  document.getElementById('fDate').value = t;
  document.getElementById('dateFrom').oninput = () => renderDashboard();
  document.getElementById('dateTo').oninput = () => renderDashboard();
  renderDashboard();
  if (currentUser) {
    document.getElementById('userInfo').textContent = 'User: '+currentUser.email;
  }
}

onAuthStateChanged(auth, user => {
  if (user) {
    currentUser = user;
    isGuest = false;
    showAuthScreen(false);
    loadDataFromFirebase();
  } else {
    showAuthScreen(true);
  }
});
</script>
